alias: Front Porch Cool - Open Door
mode: single
trigger:
  - platform: numeric_state
    entity_id: sensor.front_porch_temp_sensor_temperature
    below: input_number.front_porch_temp_threshold
    for: "00:10:00"
condition:
  - condition: time
    after: "06:00:00"
    before: "10:00:00"
action:
  - service: notify.mobile_app_pixel_10_pro_xl
    data:
      title: Front Porch Cool
      message: >
        Front porch is {{ states('sensor.front_porch_temp_sensor_temperature') | round(1) }}°F.
        Good time to open the door.
  - service: notify.mobile_app_pixel_7_pro
    data:
      title: Front Porch Cool
      message: >
        Front porch is {{ states('sensor.front_porch_temp_sensor_temperature') | round(1) }}°F.
        Good time to open the door.
