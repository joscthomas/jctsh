alias: Front Porch Open Door Reminder
mode: single
trigger:
  - platform: time
    at: "08:00:00"
condition:
  - condition: template
    value_template: >
      {{ states('sensor.front_porch_temp_sensor_temperature') | float(0) <
         states('input_number.front_porch_temp_threshold') | float(80) }}
action:
  - service: notify.mobile_app_pixel_10_pro_xl
    data:
      title: Front Porch Temp
      message: >
        Temperature is {{ states('sensor.front_porch_temp_sensor_temperature') | round(1) }}°F,
        consider opening the front door.
  - service: notify.mobile_app_pixel_7_pro
    data:
      title: Front Porch Temp
      message: >
        Temperature is {{ states('sensor.front_porch_temp_sensor_temperature') | round(1) }}°F,
        consider opening the front door.
  - delay: "00:15:00"
  - condition: template
    value_template: >
      {{ states('sensor.front_porch_temp_sensor_temperature') | float(0) <
         states('input_number.front_porch_temp_threshold') | float(80) }}
  - service: notify.mobile_app_pixel_10_pro_xl
    data:
      title: Front Porch Temp Reminder
      message: >
        Temperature is still {{ states('sensor.front_porch_temp_sensor_temperature') | round(1) }}°F,
        consider opening the front door.
  - service: notify.mobile_app_pixel_7_pro
    data:
      title: Front Porch Temp Reminder
      message: >
        Temperature is still {{ states('sensor.front_porch_temp_sensor_temperature') | round(1) }}°F,
        consider opening the front door.
