# /etc/mosquitto/conf.d/mqtt-tls.conf
# TLS listener for internet-facing MQTT (CARD-0003, split-port design).
# Only devices that leave the home network (hiking-monitor, future
# air-quality-monitor) use this port; stationary devices stay on the
# plaintext, LAN-only listener in jctsh.conf's 1883 config.
# Server-side TLS only (no client certs) — auth stays username/password,
# now over an encrypted channel.
#
# allow_anonymous/password_file are NOT repeated here: per_listener_settings
# defaults to false in this deployment (unset in mosquitto.conf/local.conf),
# so those directives from local.conf's listener-1883 block already apply
# globally to every listener, including this one. Redeclaring them here
# causes a "Duplicate password_file value" config error.

listener 8883
certfile /etc/mosquitto/certs/fullchain.pem
keyfile /etc/mosquitto/certs/privkey.pem
